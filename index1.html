<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 40%, #fdf2f8 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 28px;
            position: relative;
            letter-spacing: -0.5px;
        }

        h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            border-radius: 4px;
            margin: 10px auto 0;
        }

        input {
            width: 340px;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: #334155;
            background: #fff;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            margin-bottom: 14px;
        }

        input::placeholder {
            color: #94a3b8;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }

        body > button {
            width: 340px;
            padding: 13px 20px;
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.25s ease, background 0.3s ease;
            margin-bottom: 32px;
            letter-spacing: 0.2px;
        }

        body > button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
            background: linear-gradient(135deg, #4f46e5, #6366f1);
        }

        body > button:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }

        ul {
            list-style: none;
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        li {
            background: #fff;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 1rem;
            color: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06), 0 2px 8px rgba(0, 0, 0, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid #6366f1;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08), 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        li .delete {
            background: none;
            border: 2px solid #fecaca;
            color: #ef4444;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
            opacity: 0.7;
            margin-left: 12px;
            flex-shrink: 0;
        }

        li:hover .delete {
            opacity: 1;
        }

        li .delete:hover {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
            transform: scale(1.05);
        }

        li .delete:active {
            transform: scale(0.97);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 440px) {
            input,
            body > button,
            ul {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <h1>To-Do List</h1>
    <input placeholder="Enter Your Task">
    <button>Add Task!</button>
    <ul>
        <li>Eat <button class="delete">Delete</button></li>
        <li>Sleep <button class="delete">Delete</button></li>
    </ul>    



    <script>
    let btn = document.querySelector('button');
    let ul = document.querySelector('ul');
    let inp = document.querySelector('input');

    btn.addEventListener('click', () => {
    let item = document.createElement('li');
    item.innerText = inp.value;

    let dltBtn = document.createElement('button');
    dltBtn.innerText = 'Delete';
    dltBtn.classList.add('delete');

    item.appendChild(dltBtn);
    ul.appendChild(item);
    inp.value = '';
})

    ul.addEventListener('click', (e) => {
    
        if(e.target.nodeName == 'BUTTON'){
        let listItem = e.target.parentElement;
        listItem.remove();
}
})</script>

</body>
</html>
